repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1024']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-testmon
        name: pytest-testmon
        entry: python -m pytest --testmon -x -q --tb=short --ignore=tests/editor --ignore=tests/test_pixel_perfect.py
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
